[bans]
deny = [
    { name = "rocksdb" },
    { name = "librocksdb-sys" },
    { name = "lmdb-rkv-sys" },
    { name = "lmdb-sys" },
    { name = "ring" },
    { name = "openssl-sys" },
    # Parquet codec crates that must never appear in oxistore-columnar's dep tree.
    # oxistore-columnar uses default-features=false on parquet; these crates are
    # banned here as a tripwire to catch accidental codec feature activation.
    { name = "snap" },
    { name = "brotli" },
    { name = "flate2" },
    { name = "miniz_oxide" },
    { name = "lz4-sys" },
    { name = "zstd" },
]

[licenses]
allow = ["Apache-2.0", "MIT", "ISC", "BSD-2-Clause", "BSD-3-Clause", "Unicode-DFS-2016", "CC0-1.0"]
confidence-threshold = 0.8
